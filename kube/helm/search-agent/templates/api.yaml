apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "api") | nindent 4 }}
spec:
  selector:
    {{- include "search-agent.selectorLabels" (dict "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.config.DJANGO_PORT | int }}
      targetPort: {{ .Values.config.DJANGO_PORT | int }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "search-agent.selectorLabels" (dict "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "search-agent.componentLabels" (dict "root" $ "component" "api") | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: api
          image: {{ include "search-agent.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "/app/entrypoint.sh"]
          envFrom:
            - configMapRef:
                name: search-agent-config
            - secretRef:
                name: search-agent-secrets
          ports:
            - name: http
              containerPort: {{ .Values.config.DJANGO_PORT | int }}
          volumeMounts:
            - name: media
              mountPath: /vol/web/media
            - name: static
              mountPath: /vol/web/static
            - name: backups
              mountPath: /vol/backups
          readinessProbe:
            httpGet:
              path: /api/v1/health/
              port: {{ .Values.config.DJANGO_PORT | int }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/
              port: {{ .Values.config.DJANGO_PORT | int }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: api-media
        - name: static
          emptyDir: {}
        - name: backups
          persistentVolumeClaim:
            claimName: api-backups
