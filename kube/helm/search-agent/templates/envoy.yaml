apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "envoy") | nindent 4 }}
data:
  envoy.yaml: |
{{ .Values.envoy.configYaml | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "envoy") | nindent 4 }}
spec:
  selector:
    {{- include "search-agent.selectorLabels" (dict "component" "envoy") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "envoy") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "search-agent.selectorLabels" (dict "component" "envoy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "search-agent.componentLabels" (dict "root" $ "component" "envoy") | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: envoy
          image: {{ .Values.envoy.image }}
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --service-cluster
            - search-agent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: envoy-config
