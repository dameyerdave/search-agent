apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "redis") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "search-agent.selectorLabels" (dict "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "redis") | nindent 4 }}
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "search-agent.selectorLabels" (dict "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "search-agent.componentLabels" (dict "root" $ "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args:
            - redis-server
            - --port
            - "6379"
            - --appendonly
            - "yes"
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", "6379", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "-p", "6379", "ping"]
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.redis.storageClassName }}
        storageClassName: {{ .Values.redis.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
