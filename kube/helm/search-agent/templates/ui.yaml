apiVersion: v1
kind: Service
metadata:
  name: ui
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "ui") | nindent 4 }}
spec:
  selector:
    {{- include "search-agent.selectorLabels" (dict "component" "ui") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: {{ .Values.ui.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    {{- include "search-agent.componentLabels" (dict "root" $ "component" "ui") | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "search-agent.selectorLabels" (dict "component" "ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "search-agent.componentLabels" (dict "root" $ "component" "ui") | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      enableServiceLinks: false
      containers:
        - name: ui
          image: {{ include "search-agent.uiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NUXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: search-agent-config
                  key: NUXT_PUBLIC_API_URL
            - name: PORT
              value: {{ .Values.ui.port | quote }}
            - name: HOST
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.ui.port }}
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.ui.port }}
            periodSeconds: 10
            failureThreshold: 6
          {{- with .Values.ui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
