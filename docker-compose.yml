volumes:
  pg_data:
  redis_data:
services:
  searxng:
    image: searxng/searxng:latest
    hostname: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST_PORT:-8888}:${SEARXNG_PORT:-8080}"
    volumes:
      - ./ops/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - BASE_URL=${SEARXNG_PUBLIC_BASE_URL:-http://localhost:8888/}
      - INSTANCE_NAME=Research Search Agent
  ui:
    profiles:
      - dev
    build:
      context: ui
    volumes:
      - ./ui/app:/app
    hostname: ui
    restart: unless-stopped
    env_file: .env
    ports:
      - "${UI_HOST_PORT:-8077}:${UI_PORT:-8077}"
    command:
      - /bin/sh
      - -c
      - |
        set -e
        pnpm install --no-frozen-lockfile
        pnpm run dev
    depends_on:
      api:
        condition: service_healthy
  envoy:
    profiles:
      - proxy
    image: ${ENVOY_IMAGE:-envoyproxy/envoy:v1.35-latest}
    hostname: envoy
    restart: unless-stopped
    volumes:
      - ./ops/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "${ENVOY_HTTP_HOST_PORT:-80}:80"
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --service-cluster
      - search-agent
    depends_on:
      ui:
        condition: service_started
      api:
        condition: service_healthy
  cloudflare-tunnel:
    profiles:
      - tunnel
    image: cloudflare/cloudflared:latest
    hostname: cloudflare-tunnel
    restart: unless-stopped
    env_file: .env
    command:
      - tunnel
      - --no-autoupdate
      - run
  api:
    build:
      context: api
      args:
        DCC_ENV: ${APP_ENV:-dev}
    hostname: api
    restart: unless-stopped
    entrypoint: sh -c '/app/entrypoint.sh'
    volumes:
      - ./api/app:/app
      - ./api/backups:/vol/backups
      - ./api/static:/vol/web/static:z
      - ./api/media:/vol/web/media:z
    env_file: .env
    environment:
      - GIT_VERSION=${GIT_VERSION}
      - GIT_BRANCH=${GIT_BRANCH}
      - GIT_LASTCOMMITDATE=${GIT_LASTCOMMITDATE}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
    ports:
      - "${DJANGO_HOST_PORT:-5077}:${DJANGO_PORT:-5000}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import urllib.request; urllib.request.urlopen('http://localhost:' + os.environ.get('DJANGO_PORT', '5000') + '/api/v1/health/').read()\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
  db:
    image: postgres:18-bookworm
    hostname: db
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_HOST_PORT:-54377}:${POSTGRES_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${POSTGRES_PORT:-5432} -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pg_data:/var/lib/postgresql
  redis:
    image: redis:8-alpine
    hostname: redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - redis_data:/data
    command: redis-server --port ${REDIS_PORT:-6379} --appendonly yes
  celery-worker:
    profiles:
      - celery
    build:
      context: api
      args:
        DCC_ENV: ${APP_ENV:-dev}
    hostname: celery-worker
    restart: unless-stopped
    volumes:
      - ./api/app:/app
    env_file: .env
    command: celery -A fsex worker -l INFO
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
  celery-beat:
    profiles:
      - celery
    build:
      context: api
      args:
        DCC_ENV: ${APP_ENV:-dev}
    hostname: celery-beat
    restart: unless-stopped
    volumes:
      - ./api/app:/app
    env_file: .env
    command: celery -A fsex beat -l INFO
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
